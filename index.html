<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Averos Music :: 2023</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/0ff77af828.js" crossorigin="anonymous"></script>

<body>
    <header>
        <nav class="topnav">

                            </div>

                        </div>
                    </div>
                    <div class="b-musica card">
                        <h3 class="cardTitle">Últimos Lanzamientos</h3>
                        <div class="listaMusica">
                            <div class="single single-1">
                                <img src="./resources/img/singles/single-1/cover.jpg" alt="">

                                    <h4 class="primeraLinea">Averos Music, AddiSonG</h1>
                                        <p class="cancionNombre">Ser Un Niño Otra Vez</p>
                                </div>
                                <div class="plataformas">
                                    <a href="https://open.spotify.com/album/2aNcEZSbpNSylzpE1WuRFD" target="_blank" rel="noopener noreferrer"><i class="fab fa-spotify"></i></a>

                                    <a href="https://music.apple.com/us/album/ser-un-ni%C3%B1o-otra-vez-feat-addisong/1708634683?i=1708634685" target="_blank" rel="noopener noreferrer"><i class="fab fa-apple"></i></a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="trabajando">
                <h1>AUN ESTAMOS TRABAJANDO PARA GRANDES SORPRESAS...</h1>
            </div>
            <div class="redessociales">
                <p>Síganos en nuestras redes sociales:</p>
                <a href="https://instagram.com/averos_official"><i class="fab fa-instagram"></i></a>
                <a href="https://facebook.com/people/Averos/100094897604685/"><i class="fab fa-facebook"></i></a>
                <a href="https://www.youtube.com/channel/UC-ANElMqJsrkBWTf4pTjVHA"><i
                        class="fab fa-youtube"></i></a>
                <a href="https://www.tiktok.com/@averos1112"><i class="fab fa-tiktok"></i></a>
            </div>
    </main>

</html>
